<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blade Battle - Web Game</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>Blade Battle</h1>
            <div class="game-stats">
                <div class="blade-counts">
                    <span class="blade red">Red: <span id="red-blades">0</span></span>
                    <span class="blade yellow">Yellow: <span id="yellow-blades">0</span></span>
                    <span class="blade blue">Blue: <span id="blue-blades">0</span></span>
                </div>
                <div class="enemy-count">Enemies: <span id="enemy-count">0</span></div>
            </div>
        </header>

        <main class="game-area">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div class="game-controls">
                <p>Use arrow keys to move</p>
                <p>Collect blades to increase your power</p>
                <p>Red blades are the strongest!</p>
            </div>
        </main>

        <div id="game-over" class="game-over hidden">
            <h2>Game Over</h2>
            <p>You were defeated!</p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script src="js/game.js"></script>
    <script src="js/player.js"></script>
    <script src="js/blade.js"></script>
    <script src="js/npc.js"></script>
</body>
</html>
